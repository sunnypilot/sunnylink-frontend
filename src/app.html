<!doctype html>
<html lang="en" data-theme="sunny-dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet"
		/>
		<style>
			/* Alias "Inter" as "Inter Variable" for Linear-compatible font stack */
			@font-face {
				font-family: 'Inter Variable';
				src: local('Inter');
				font-weight: 100 900;
				font-style: normal;
			}
		</style>
		<link rel="icon" href="/pwa-icon-180.png" type="image/png" />
		<link rel="apple-touch-icon" href="/pwa-icon-180.png" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#0f1726" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
